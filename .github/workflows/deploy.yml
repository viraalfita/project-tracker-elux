name: Deploy to VPS

on:
  push:
    branches:
      - main
      - dev

jobs:
  deploy-production:
    name: Deploy Production
    if: github.ref == 'refs/heads/main'
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sync production app to VPS
        run: |
          rsync -rlvz --delete --omit-dir-times --no-perms \
            --exclude ".git" \
            --exclude ".github" \
            --exclude "node_modules" \
            --exclude ".next" \
            --exclude ".DS_Store" \
            --exclude ".agents" \
            --exclude ".env" \
            ./ /opt/stack/app/

      - name: Deploy production stack
        run: |
          cd /opt/stack
          docker compose up -d --build app

  deploy-development:
    name: Deploy Development
    if: github.ref == 'refs/heads/dev'
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ensure development env file exists
        run: |
          mkdir -p /opt/stack/dev/app
          touch /opt/stack/dev/app/.env

      - name: Sync development app to VPS
        run: |
          rsync -rlvz --delete --omit-dir-times --no-perms \
            --exclude ".git" \
            --exclude ".github" \
            --exclude "node_modules" \
            --exclude ".next" \
            --exclude ".DS_Store" \
            --exclude ".agents" \
            --exclude ".env" \
            ./ /opt/stack/dev/app/

      - name: Deploy development stack
        run: |
          cd /opt/stack/dev
          docker compose up -d --build app