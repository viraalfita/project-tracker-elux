name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sync project to server
        run: |
          rsync -av --delete ./ /opt/stack/app/

      - name: Restart containers
        run: |
          cd /opt/stack
          docker compose up -d --build
          docker image prune -f
